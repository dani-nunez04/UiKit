<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejemplo 3: Formulario de Contacto con UIKit</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/uikit@3/dist/css/uikit.min.css">
    <script src="https://cdn.jsdelivr.net/npm/uikit@3/dist/js/uikit.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/uikit@3/dist/js/uikit-icons.min.js"></script>
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            padding: 20px;
        }
        .form-container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            overflow: hidden;
        }
        .form-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 40px 30px;
            text-align: center;
        }
        .form-header h1 {
            margin-bottom: 10px;
            font-size: 2em;
        }
        .form-header p {
            margin: 0;
            opacity: 0.9;
        }
        .form-body {
            padding: 40px 30px;
        }
        .input-group {
            margin-bottom: 25px;
        }
        .input-group label {
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
            display: block;
        }
        .input-group input,
        .input-group textarea,
        .input-group select {
            width: 100%;
            border-radius: 6px;
            border: 2px solid #e0e0e0;
            font-size: 1em;
            transition: all 0.3s;
        }
        .input-group input:focus,
        .input-group textarea:focus,
        .input-group select:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
            outline: none;
        }
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        @media (max-width: 640px) {
            .form-row {
                grid-template-columns: 1fr;
            }
        }
        .checkbox-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .checkbox-group label {
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 400;
            cursor: pointer;
            margin-bottom: 0;
        }
        .submit-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 1.1em;
            font-weight: 600;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s;
            width: 100%;
        }
        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        .required {
            color: #ff6b6b;
        }
        .form-info {
            background: #f0f4ff;
            border-left: 4px solid #667eea;
            padding: 15px;
            border-radius: 4px;
            margin-bottom: 30px;
            font-size: 0.95em;
            color: #333;
        }
    </style>
</head>
<body>
    <div class="form-container uk-container uk-container-small">
        <!-- Header -->
        <div class="form-header">
            <h1>📧 Contáctanos</h1>
            <p>Queremos saber de ti. Rellena este formulario para ponernos en contacto.</p>
        </div>

        <!-- Formulario -->
        <div class="form-body">
            <div class="form-info">
                <strong>ℹ️ Nota:</strong> Los campos marcados con <span class="required">*</span> son obligatorios.
            </div>

            <form id="formulario">
                <!-- Datos Personales -->
                <h3 style="margin-top: 0; margin-bottom: 20px; color: #333;">Información Personal</h3>

                <div class="form-row">
                    <div class="input-group">
                        <label>Nombre <span class="required">*</span></label>
                        <input type="text" placeholder="Tu nombre completo" required>
                    </div>
                    <div class="input-group">
                        <label>Apellido <span class="required">*</span></label>
                        <input type="text" placeholder="Tu apellido" required>
                    </div>
                </div>

                <div class="input-group">
                    <label>Email <span class="required">*</span></label>
                    <input type="email" placeholder="tu@email.com" required>
                </div>

                <div class="input-group">
                    <label>Teléfono</label>
                    <input type="tel" placeholder="+34 123 456 789">
                </div>

                <!-- Asunto y Mensaje -->
                <h3 style="margin-bottom: 20px; color: #333;">Tu Mensaje</h3>

                <div class="input-group">
                    <label>Asunto <span class="required">*</span></label>
                    <select required>
                        <option value="">Selecciona un asunto</option>
                        <option value="ventas">Información de Ventas</option>
                        <option value="soporte">Soporte Técnico</option>
                        <option value="consulta">Consulta General</option>
                        <option value="otro">Otro</option>
                    </select>
                </div>

                <div class="input-group">
                    <label>Mensaje <span class="required">*</span></label>
                    <textarea placeholder="Cuéntanos sobre tu consulta..." rows="6" required></textarea>
                </div>

                <!-- Preferencias -->
                <h3 style="margin-bottom: 20px; color: #333;">Preferencias de Contacto</h3>

                <div class="input-group">
                    <label>¿Cómo prefieres que te contactemos?</label>
                    <div class="checkbox-group">
                        <label>
                            <input type="radio" name="contacto" value="email" checked>
                            Por Email
                        </label>
                        <label>
                            <input type="radio" name="contacto" value="telefono">
                            Por Teléfono
                        </label>
                        <label>
                            <input type="radio" name="contacto" value="whatsapp">
                            Por WhatsApp
                        </label>
                    </div>
                </div>

                <div class="input-group">
                    <div class="checkbox-group">
                        <label>
                            <input type="checkbox">
                            Deseo recibir información sobre nuevos productos y servicios
                        </label>
                        <label>
                            <input type="checkbox" required>
                            He leído y acepto la <a href="#" style="color: #667eea; text-decoration: underline;">Política de Privacidad</a> <span class="required">*</span>
                        </label>
                    </div>
                </div>

                <!-- Botones -->
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 30px;">
                    <button type="reset" class="uk-button uk-button-default" style="width: 100%;">Limpiar Formulario</button>
                    <button type="submit" class="submit-btn">Enviar Mensaje</button>
                </div>
            </form>

            <!-- Mensaje de éxito (oculto por defecto) -->
            <div id="success-message" class="uk-alert-success" uk-alert style="display: none; margin-top: 20px;">
                <a class="uk-alert-close" uk-close></a>
                <p><strong>¡Éxito!</strong> Tu mensaje ha sido enviado correctamente. Nos pondremos en contacto en breve.</p>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('formulario').addEventListener('submit', function(e) {
            e.preventDefault();
            
            // Validar formulario
            if (this.checkValidity() === false) {
                alert('Por favor, rellena todos los campos obligatorios.');
                return;
            }

            // Mostrar mensaje de éxito
            document.getElementById('success-message').style.display = 'block';
            
            // Limpiar formulario
            this.reset();
            
            // Ocultar mensaje después de 5 segundos
            setTimeout(() => {
                document.getElementById('success-message').style.display = 'none';
            }, 5000);
        });
    </script>
</body>
</html>
